<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blox Gain | Login</title>
    <style>
        body { background: #0a0e1a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #161b2c; padding: 30px; border-radius: 15px; text-align: center; width: 300px; border: 1px solid #232d45; }
        input { width: 100%; padding: 12px; margin: 15px 0; background: #0a0e1a; border: 1px solid #232d45; color: white; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: #3b82f6; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Blox Gain</h2>
        <input type="text" id="nick" placeholder="Nick do Roblox">
        <button onclick="save()">Entrar</button>
    </div>
    <script>
        function save() {
            const n = document.getElementById('nick').value;
            if(n) { localStorage.setItem('robloxNick', n); window.location.href='index.html'; }
        }
    </script>
</body>
</html>
