<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blox Gain | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0a0e1a; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding-top: 40px; }
        
        .dash-container { width: 90%; max-width: 400px; }
        
        /* Header Azul Profissional */
        .user-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 45px; height: 45px; background: #1e293b; border-radius: 50%; border: 2px solid #3b82f6; }
        .settings-icon { font-size: 1.4rem; cursor: pointer; transition: 0.3s; opacity: 0.7; }
        .settings-icon:hover { opacity: 1; transform: rotate(45deg); }

        /* Card de Saldo Azul */
        .main-card { background: #161b2c; border: 1px solid #232d45; border-radius: 24px; padding: 35px 20px; text-align: center; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .main-card p { font-size: 0.8rem; letter-spacing: 1px; color: #94a3b8; }
        .main-card h1 { font-size: 4rem; font-weight: 900; margin: 10px 0; color: #fff; }
        .btn-action { width: 100%; background: #3b82f6; color: white; border: none; padding: 16px; border-radius: 14px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        .btn-action:active { transform: scale(0.98); background: #2563eb; }

        /* Tarefas Estilo Antigo */
        .card-task { background: #161b2c; border: 1px solid #232d45; border-radius: 20px; padding: 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .card-task:active { background: #1e293b; }
        .icon-box { width: 45px; height: 45px; background: #1e293b; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #3b82f6; }

        /* Modal Settings */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal.active { display: flex; }
        .modal-content { background: #161b2c; padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; border: 1px solid #3b82f6; }
        .setting-row { display: flex; justify-content: space-between; margin: 15px 0; align-items: center; }

        /* Toast Profissional */
        .toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #3b82f6; color: white; padding: 12px 25px; border-radius: 50px; transition: 0.5s; font-weight: bold; z-index: 200; box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4); }
        .toast.show { top: 30px; }
    </style>
</head>
<body onclick="initAudio()">
    <audio id="bgMusic" loop><source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mpeg"></audio>
    <audio id="clickSound"><source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg"></audio>

    <div id="toast" class="toast">Saldo Atualizado!</div>

    <div class="dash-container">
        <header class="user-bar">
            <div class="user-info">
                <div class="avatar"></div>
                <h3 id="nick">Usuário</h3>
            </div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <span class="settings-icon" onclick="toggleModal()">⚙️</span>
                <span style="cursor:pointer; font-size: 0.8rem; opacity: 0.5;" onclick="logout()">Sair</span>
            </div>
        </header>

        <section class="main-card">
            <p>SALDO BLOXGAIN</p>
            <h1 id="balance">0</h1>
            <button onclick="withdraw()" class="btn-action">RETIRAR ROBUX</button>
        </section>

        <h4 style="margin-bottom: 15px; color: #94a3b8; font-size: 0.9rem;">Ganhar Moedas</h4>
        <div class="card-task" onclick="earn(5)">
            <div class="icon-box">▶</div>
            <div>
                <h4 style="font-size: 0.9rem;">VÍDEO PREMIADO</h4>
                <p style="font-size: 0.7rem; color: #3b82f6;">Assista e ganhe +5 BXC</p>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px; text-align: center;">Ajustes</h3>
            <div class="setting-row">
                <span>Música de Fundo</span>
                <input type="checkbox" id="musicCheck" checked onchange="updateAudio()">
            </div>
            <div class="setting-row">
                <span>Efeitos Sonoros</span>
                <input type="checkbox" id="sfxCheck" checked>
            </div>
            <button onclick="toggleModal()" class="btn-action" style="margin-top: 10px; padding: 10px;">FECHAR</button>
        </div>
    </div>

    <script>
        let bxc = parseInt(localStorage.getItem('bxcBalance')) || 0;
        document.getElementById('balance').innerText = bxc;
        document.getElementById('nick').innerText = localStorage.getItem('robloxNick') || 'Player';

        function initAudio() {
            const m = document.getElementById('bgMusic');
            m.volume = 0.05; // VOLUME BEM BAIXO DA MÚSICA
            if(document.getElementById('musicCheck').checked) m.play().catch(()=>{});
        }

        function playClick() {
            if(document.getElementById('sfxCheck').checked) {
                const s = document.getElementById('clickSound');
                s.volume = 0.2; // VOLUME BAIXO DO CLIQUE
                s.currentTime = 0; s.play();
            }
        }

        function updateAudio() {
            const m = document.getElementById('bgMusic');
            if(!document.getElementById('musicCheck').checked) m.pause(); else m.play();
        }

        function earn(amt) {
            playClick();
            bxc += amt;
            localStorage.setItem('bxcBalance', bxc);
            document.getElementById('balance').innerText = bxc;
            notify(`+${amt} BXC Creditado!`);
        }

        function withdraw() {
            playClick();
            notify(bxc < 1000 ? "Mínimo: 1000 BXC" : "Solicitado!");
        }

        function notify(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function toggleModal() { playClick(); document.getElementById('modal').classList.toggle('active'); }
        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
    </script>
</body>
</html>
