<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blox Gain | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animate"></div>
    <div class="login-container">
        <div class="login-box">
            <h1 class="logo">Blox<span>Gain</span></h1>
            <p class="subtitle">Conecte-se para começar a faturar</p>
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="robloxNick" required placeholder=" ">
                    <label>Nick do Roblox</label>
                </div>
                <div class="input-group">
                    <input type="email" id="userEmail" required placeholder=" ">
                    <label>E-mail ou Conta Google</label>
                </div>
                <button type="submit" class="btn-login">Entrar no Painel</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            localStorage.setItem('robloxNick', document.getElementById('robloxNick').value);
            localStorage.setItem('bxcBalance', '0');
            window.location.href = 'dashboard.html';
        };
    </script>
</body>
</html>
