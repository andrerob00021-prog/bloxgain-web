<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blox Gain | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0a0e1a; color: white; min-height: 100vh; display: flex; justify-content: center; padding-top: 40px; }
        .dash-container { width: 90%; max-width: 400px; }
        .main-card { background: #161b2c; border: 1px solid #232d45; border-radius: 24px; padding: 35px 20px; text-align: center; margin-bottom: 25px; }
        .btn-action { width: 100%; background: #3b82f6; color: white; border: none; padding: 16px; border-radius: 14px; font-weight: bold; cursor: pointer; }
        .toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #3b82f6; color: white; padding: 12px 25px; border-radius: 50px; transition: 0.5s; font-weight: bold; }
        .toast.show { top: 30px; }
    </style>
</head>
<body onclick="startMusic()">
    <audio id="bgMusic" loop><source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mpeg"></audio>
    <audio id="clickSound"><source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg"></audio>

    <div id="toast" class="toast">Sucesso!</div>

    <div class="dash-container">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 id="nick">Usuário</h3>
            <span style="cursor:pointer;" onclick="localStorage.clear(); window.location.href='login.html'">Sair</span>
        </header>

        <section class="main-card">
            <p style="color:#94a3b8; font-size:0.8rem;">SALDO</p>
            <h1 id="balance" style="font-size:4rem; margin:10px 0;">0</h1>
            <button class="btn-action" onclick="showToast('Saque indisponível')">RETIRAR</button>
        </section>
        
        <div style="background:#161b2c; padding:20px; border-radius:20px; display:flex; align-items:center; gap:15px; cursor:pointer;" onclick="earn(5)">
            <div style="background:#1e293b; padding:10px; border-radius:10px;">▶</div>
            <div><h4>Vídeo Premiado</h4><p style="color:#3b82f6; font-size:0.7rem;">+5 BXC</p></div>
        </div>
    </div>

    <script>
        let bxc = parseInt(localStorage.getItem('bxcBalance')) || 0;
        document.getElementById('balance').innerText = bxc;
        document.getElementById('nick').innerText = localStorage.getItem('robloxNick') || 'Player';

        function startMusic() {
            const m = document.getElementById('bgMusic');
            m.volume = 0.05; // Música bem baixinha
            m.play().catch(()=>{});
        }
        function earn(amt) {
            const s = document.getElementById('clickSound');
            s.volume = 0.2; s.play();
            bxc += amt;
            localStorage.setItem('bxcBalance', bxc);
            document.getElementById('balance').innerText = bxc;
            showToast(`+${amt} BXC!`);
        }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
