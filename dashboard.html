<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blox Gain | Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style-v3.css">
</head>
<body onclick="startMusic()">
    <div class="background-animate"></div>
    
    <audio id="bgMusic" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mpeg">
    </audio>
    <audio id="clickSound">
        <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg">
    </audio>

    <div class="dash-container">
        <header class="user-bar">
            <h2 id="displayNick">Carregando...</h2>
            <button onclick="logout()" class="btn-exit">Sair</button>
        </header>

        <section class="main-card">
            <p>SALDO BXC</p>
            <h1 id="balance">0</h1>
            <button onclick="playClick(); checkWithdraw()" class="btn-action pulse">RETIRAR ROBUX</button>
        </section>

        <div class="card-task" onclick="playClick(); earn(5)">
            <span>▶</span>
            <div>
                <h4>Vídeo Premiado</h4>
                <p>+5 BXC</p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-notification"></div>

    <script>
        let balance = parseInt(localStorage.getItem('bxcBalance')) || 0;
        document.getElementById('displayNick').innerText = localStorage.getItem('robloxNick') || 'User';
        document.getElementById('balance').innerText = balance;

        function startMusic() {
            const music = document.getElementById('bgMusic');
            music.volume = 0.2; // Bem baixinho pra ser suave
            music.play().catch(() => {}); 
        }

        function playClick() {
            const click = document.getElementById('clickSound');
            click.volume = 0.5;
            click.currentTime = 0;
            click.play();
        }

        function earn(amount) {
            balance += amount;
            localStorage.setItem('bxcBalance', balance);
            document.getElementById('balance').innerText = balance;
            showToast(`+${amount} BXC Creditado!`);
        }

        function checkWithdraw() {
            showToast(balance < 1000 ? "Mínimo: 1000 BXC" : "Processando...");
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('active');
            setTimeout(() => t.classList.remove('active'), 3000);
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
