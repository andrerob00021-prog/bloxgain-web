<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blox Gain | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animate"></div>
    
    <div class="dash-container">
        <header class="user-bar">
            <div class="user-info">
                <div class="avatar-placeholder"></div>
                <div>
                    <h2 id="displayNick">User</h2>
                    <span class="status-tag">Membro Ativo</span>
                </div>
            </div>
            <button onclick="logout()" class="btn-logout">Sair</button>
        </header>

        <main class="stats-card">
            <p>SALDO DISPONÍVEL</p>
            <div class="balance-row">
                <h1 id="balance">0</h1>
                <span>BXC</span>
            </div>
            <button class="btn-withdraw">RETIRAR ROBUX</button>
        </main>

        <section class="earn-section">
            <h3>Ganhar Moedas</h3>
            <div class="task-card">
                <div class="task-icon">▶</div>
                <div class="task-info">
                    <h4>Vídeo Premiado</h4>
                    <p>Assista e ganhe +5 BXC</p>
                </div>
                <button onclick="earn(5)" class="btn-play">PLAY</button>
            </div>
        </section>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let balance = parseInt(localStorage.getItem('bxcBalance')) || 0;
        const nick = localStorage.getItem('robloxNick') || 'Convidado';
        
        document.getElementById('displayNick').innerText = nick;
        document.getElementById('balance').innerText = balance;

        function earn(amount) {
            balance += amount;
            localStorage.setItem('bxcBalance', balance);
            document.getElementById('balance').innerText = balance;
            showToast(`+${amount} BXC adicionados!`);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
