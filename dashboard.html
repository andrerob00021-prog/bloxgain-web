<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blox Gain | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style-v2.css">
</head>
<body>
    <div class="background-animate"></div>
    
    <div class="dash-container">
        <header class="user-bar">
            <div class="user-info">
                <div class="avatar-ring">
                    <img src="https://www.roblox.com/headshot-thumbnail/image?userId=1&width=420&height=420&format=png" id="userAvatar" alt="Avatar">
                </div>
                <div>
                    <h2 id="displayNick">Carregando...</h2>
                    <span class="badge">MEMBRO PREMIUM</span>
                </div>
            </div>
            <button onclick="logout()" class="btn-exit">Sair</button>
        </header>

        <section class="main-card">
            <p class="label">SALDO DISPONÍVEL</p>
            <div class="balance-group">
                <span class="currency">BXC</span>
                <h1 id="balance">0</h1>
            </div>
            <button class="btn-action pulse">RETIRAR ROBUX</button>
        </section>

        <section class="tasks">
            <h3>Atividades Disponíveis</h3>
            <div class="card-task" onclick="earn(5)">
                <div class="icon-play">▶</div>
                <div class="text">
                    <h4>Vídeo Premiado</h4>
                    <p>Ganhe +5 BXC agora</p>
                </div>
                <div class="arrow">→</div>
            </div>
        </section>
    </div>

    <div id="toast" class="toast-notification"></div>

    <script>
        let balance = parseInt(localStorage.getItem('bxcBalance')) || 0;
        const nick = localStorage.getItem('robloxNick') || 'Convidado';
        
        document.getElementById('displayNick').innerText = nick;
        document.getElementById('balance').innerText = balance;

        function earn(amount) {
            balance += amount;
            localStorage.setItem('bxcBalance', balance);
            document.getElementById('balance').innerText = balance;
            
            // Notificação profissional
            showToast(`+${amount} BXC creditados com sucesso!`);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 3000);
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
